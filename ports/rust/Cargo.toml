[package]
name = "cisbench"
version = "0.1.0"
edition = "2021"
description = "Rust port of the cisbench passive DB-hardening checker (offline)."
authors = ["Cognis Digital <dev@cognis.digital>"]
license = "LicenseRef-COCL-1.0"

[[bin]]
name = "cisbench"
path = "src/main.rs"

[lib]
name = "cisbench"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
